server.port=8081
spring.datasource.url=jdbc:mysql://localhost:3306/cover_letter_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=your_mysql_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
claude.api.key=your_claude_api_key_here
openai.api.key=your_openai_api_key_here
claude.api.url=https://api.anthropic.com/v1/messages
claude.model=claude-sonnet-4-20250514
claude.max-tokens=2000
openai.embedding.url=https://api.openai.com/v1/embeddings
openai.embedding.model=text-embedding-ada-002
chunking.size=500
chunking.overlap=50
spring.thymeleaf.cache=false

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Cover Letters</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="navbar navbar-dark bg-dark px-4">
    <a class="navbar-brand fw-bold" href="/">AI Cover Letter Generator</a>
    <a class="btn btn-primary btn-sm" href="/">New Letter</a>
</nav>
<div class="container py-5">
    <h2 class="fw-bold mb-4">My Cover Letters</h2>

    <div th:if="${#lists.isEmpty(letters)}" class="text-center py-5 text-muted">
        <p class="fs-5">No cover letters yet.</p>
        <a href="/" class="btn btn-primary">Generate Your First</a>
    </div>

    <div th:if="${!#lists.isEmpty(letters)}" class="card border-0 shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                    <tr>
                        <th>Date</th>
                        <th>Company</th>
                        <th>Role</th>
                        <th>Tone</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="l : ${letters}">
                        <td class="text-muted small"
                            th:text="${#temporals.format(l.createdAt, 'dd MMM yyyy')}"></td>
                        <td th:text="${l.companyName}"></td>
                        <td th:text="${l.jobTitle}"></td>
                        <td>
                            <span class="badge bg-secondary" th:text="${l.tone}"></span>
                        </td>
                        <td class="d-flex gap-2">
                            <a th:href="@{/view/{id}(id=${l.id})}"
                               class="btn btn-outline-primary btn-sm">View</a>
                            <a th:href="@{/download/{id}(id=${l.id})}"
                               class="btn btn-outline-success btn-sm">PDF</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

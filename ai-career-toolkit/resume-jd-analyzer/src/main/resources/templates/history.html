<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analysis History — Resume JD Analyzer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar navbar-dark bg-dark px-4">
    <a class="navbar-brand fw-bold" href="/">Resume JD Analyzer</a>
    <a class="btn btn-primary btn-sm" href="/">New Analysis</a>
</nav>

<div class="container py-5">

    <h2 class="fw-bold mb-4">Analysis History</h2>

    <!-- Empty state -->
    <div th:if="${#lists.isEmpty(results)}" class="text-center py-5 text-muted">
        <p class="fs-5">No analyses yet.</p>
        <a href="/" class="btn btn-primary">Run Your First Analysis</a>
    </div>

    <!-- Results table -->
    <div th:if="${!#lists.isEmpty(results)}" class="card border-0 shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                    <tr>
                        <th>Date</th>
                        <th>Resume</th>
                        <th>Job Title</th>
                        <th>Score</th>
                        <th>Match Level</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="r : ${results}">
                        <td class="text-muted small"
                            th:text="${#temporals.format(r.createdAt, 'dd MMM yyyy HH:mm')}"></td>
                        <td th:text="${r.resumeFilename}"></td>
                        <td th:text="${r.jobTitle}"></td>
                        <td>
                            <span class="fw-bold" th:text="${r.matchScore} + '%'"></span>
                        </td>
                        <td>
                            <span class="badge"
                                  th:classappend="${r.matchLevel == 'Strong Match'} ? 'bg-success'
                                                : (${r.matchLevel == 'Partial Match'} ? 'bg-warning text-dark' : 'bg-danger')"
                                  th:text="${r.matchLevel}"></span>
                        </td>
                        <td>
                            <a th:href="@{/result/{id}(id=${r.id})}"
                               class="btn btn-outline-primary btn-sm">View</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

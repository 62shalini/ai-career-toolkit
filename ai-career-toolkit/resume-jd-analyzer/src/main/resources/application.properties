# ── Server ──────────────────────────────────────────────
server.port=8080

# ── MySQL Database ───────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/resume_analyzer_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=your_mysql_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ──────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ── File Upload ──────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ── API Keys (replace with your real keys) ───────────────
claude.api.key=your_claude_api_key_here
openai.api.key=your_openai_api_key_here

# ── Claude API config ────────────────────────────────────
claude.api.url=https://api.anthropic.com/v1/messages
claude.model=claude-sonnet-4-20250514
claude.max-tokens=2000

# ── OpenAI Embedding config ──────────────────────────────
openai.embedding.url=https://api.openai.com/v1/embeddings
openai.embedding.model=text-embedding-ada-002

# ── Chunking config ──────────────────────────────────────
chunking.size=500
chunking.overlap=50

# ── Thymeleaf ────────────────────────────────────────────
spring.thymeleaf.cache=false
